<!-- Modal backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop"
     style="background:rgba(28,27,27,0.32);backdrop-filter:blur(6px)">

  <div class="modal-panel w-[580px] max-w-[calc(100%-64px)] bg-surface-lowest rounded-2xl overflow-hidden shadow-[0_24px_48px_-12px_rgba(28,27,27,0.10)]">
    <div class="h-[3px] bg-gradient-primary" style="opacity:0.85"></div>

    <!-- Header -->
    <div class="px-8 pt-7 pb-2 flex justify-between items-start gap-4">
      <div>
        <div class="eyebrow mb-2.5 text-primary" style="color:#24389c">TASKS · NEW</div>
        <h2 class="text-[24px] leading-[1.1] mb-1.5" style="font-family:'Manrope',sans-serif">A new intention.</h2>
        <p class="text-[13px] text-on-variant m-0 leading-relaxed">The smaller, the better. Big tasks live as sub-tasks under a clear outcome.</p>
      </div>
      <button class="w-8 h-8 rounded-xl bg-surface-low border-none cursor-pointer text-[14px] text-on-variant flex-shrink-0">✕</button>
    </div>

    <!-- Body -->
    <div class="px-8 pt-5">
      <div class="mb-4">
        <label class="lumin-label">Title</label>
        <input class="lumin-input" placeholder="e.g. Draft May newsletter — second pass" />
      </div>

      <div class="mb-4">
        <label class="lumin-label">Notes (optional)</label>
        <div class="text-[11.5px] text-on-muted mb-2">Markdown supported · &#64;mention to assign · [[link]] another task</div>
        <textarea class="lumin-input" rows="3" placeholder="Why does this matter? What does done look like?" style="resize:vertical;min-height:72px;font-family:'Inter',sans-serif"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-3.5 mb-4">
        <div>
          <label class="lumin-label">Due</label>
          <input class="lumin-input" value="Today · Fri May 02" />
        </div>
        <div>
          <label class="lumin-label">Time</label>
          <input class="lumin-input" value="15:00" />
        </div>
      </div>

      <div class="mb-4">
        <label class="lumin-label">List</label>
        <div class="flex flex-wrap gap-1.5">
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-primary text-white">Today</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">This week</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">Inbox</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">Studio</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">Writing</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">Admin</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">Someday</button>
        </div>
      </div>

      <div class="mb-4">
        <label class="lumin-label">Priority</label>
        <div class="flex gap-1.5">
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">Low</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-primary text-white">Medium</button>
          <button class="px-3 py-[7px] rounded-full border-none text-[12px] font-semibold cursor-pointer bg-surface-low text-on-variant">High</button>
        </div>
      </div>

      <div class="mb-2">
        <label class="lumin-label">Subtasks (optional)</label>
        <div class="bg-surface-low rounded-xl px-3 py-2.5">
          <div class="flex items-center gap-2.5 py-1.5">
            <span class="w-4 h-4 rounded-[5px] bg-surface-lowest"></span>
            <span class="text-[13.5px] text-on-surface">Outline three sections</span>
          </div>
          <div class="flex items-center gap-2.5 py-1.5">
            <span class="w-4 h-4 rounded-[5px] bg-surface-lowest"></span>
            <span class="text-[13.5px] text-on-surface">Pull in the studio anecdote</span>
          </div>
          <div class="flex items-center gap-2.5 py-1.5">
            <span class="w-4 h-4 rounded-[5px] bg-surface-lowest"></span>
            <span class="text-[13.5px] text-on-surface">Pass to Marta for read</span>
          </div>
          <div class="flex items-center gap-2.5 py-1.5 text-on-muted">
            <span class="text-base">+</span>
            <span class="text-[13px]">Add subtask…</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-8 py-5 mt-2 flex justify-between items-center">
      <div class="text-[11.5px] text-on-muted">
        <kbd class="lumin-kbd">⌘</kbd> <kbd class="lumin-kbd">↵</kbd> save and add another
      </div>
      <div class="flex gap-2">
        <button class="btn-secondary">Cancel</button>
        <button class="btn-primary">Add task</button>
      </div>
    </div>
  </div>
</div>
