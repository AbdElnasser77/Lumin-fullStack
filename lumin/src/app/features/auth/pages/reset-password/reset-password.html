<!-- Auth Card -->
<div class="w-[440px] bg-surface-lowest rounded-2xl p-10 shadow-[0_12px_32px_-4px_rgba(28,27,27,0.06)]">

  <!-- Header -->
  <div class="mb-7">
    <div class="eyebrow mb-3.5">№ 04 · NEW KEY</div>
    <h1 class="text-[32px] leading-[1.05] mb-2.5" style="font-family:'Manrope',sans-serif">
      Set a new<br>password.
    </h1>
    <p class="text-[14px] text-on-variant leading-relaxed m-0">
      Make it strong — you'll only need to do this once.
    </p>
  </div>

  <form [formGroup]="resetForm">
    <!-- New password -->
    <div class="mb-4">
      <label class="lumin-label">New password</label>
      <input
        formControlName="newPassword"
        class="lumin-input"
        type="password"
        placeholder="••••••••••"
      />
      <small *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched" style="color: var(--error); display: block; margin-top: 4px; font-size: 12px;">
        Password must be at least 8 characters
      </small>
    </div>

    <!-- Confirm password -->
    <div class="mb-4">
      <label class="lumin-label">Confirm new password</label>
      <input
        formControlName="confirmPassword"
        class="lumin-input"
        type="password"
        placeholder="••••••••••"
      />
      <small *ngIf="resetForm.hasError('passwordMismatch') && resetForm.get('confirmPassword')?.touched" style="color: var(--error); display: block; margin-top: 4px; font-size: 12px;">
        Passwords do not match
      </small>
    </div>

    <!-- Requirements box -->
    <div class="p-4 bg-surface-low rounded-xl mb-5">
      <div class="eyebrow mb-2.5">Requirements</div>

      <!-- Minimum length -->
      <div class="flex items-center gap-2.5 text-[12.5px] text-on-variant mb-1.5">
        <span [style.background]="passwordStrength.minLength ? 'var(--primary)' : 'var(--surface-high)'" class="w-4 h-4 rounded-full flex items-center justify-center text-white text-[10px] font-bold">
          <span *ngIf="passwordStrength.minLength">✓</span>
        </span>
        At least 8 characters
      </div>

      <!-- Uppercase -->
      <div class="flex items-center gap-2.5 text-[12.5px] text-on-variant mb-1.5">
        <span [style.background]="passwordStrength.uppercase ? 'var(--primary)' : 'var(--surface-high)'" class="w-4 h-4 rounded-full flex items-center justify-center text-white text-[10px] font-bold">
          <span *ngIf="passwordStrength.uppercase">✓</span>
        </span>
        One uppercase letter
      </div>

      <!-- Number -->
      <div class="flex items-center gap-2.5 text-[12.5px] text-on-variant mb-1.5">
        <span [style.background]="passwordStrength.number ? 'var(--primary)' : 'var(--surface-high)'" class="w-4 h-4 rounded-full flex items-center justify-center text-white text-[10px] font-bold">
          <span *ngIf="passwordStrength.number">✓</span>
        </span>
        One number
      </div>

      <!-- Symbol -->
      <div class="flex items-center gap-2.5 text-[12.5px] text-on-variant">
        <span [style.background]="passwordStrength.symbol ? 'var(--primary)' : 'var(--surface-high)'" class="w-4 h-4 rounded-full flex items-center justify-center text-white text-[10px] font-bold">
          <span *ngIf="passwordStrength.symbol">✓</span>
        </span>
        One symbol (!, @, #, $)
      </div>
    </div>

    <!-- Save button -->
    <button
      (click)="onSubmit()"
      [disabled]="isLoading || resetForm.invalid || !isPasswordStrong()"
      class="btn-primary w-full h-12 text-[15px] justify-center"
    >
      {{ isLoading ? 'Saving...' : 'Save new password' }}
    </button>
  </form>
</div>
